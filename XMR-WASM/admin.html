<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Mining Stats</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: rgba(20,20,24,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 20px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }
    .header .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }
    .header .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .header .badge-dot.active { background: #3fcf6a; box-shadow: 0 0 8px #3fcf6a; }
    .header .badge-dot.error { background: #e74c3c; box-shadow: 0 0 8px #e74c3c; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(20,20,24,0.9);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.12); }
    .stat-card .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .stat-card .value.small { font-size: 18px; word-break: break-all; }
    .stat-card .value.hashrate { color: #3fcf6a; }
    .stat-card .value.shares { color: #c9a84c; }
    .stat-card .sub {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .panel {
      background: rgba(20,20,24,0.9);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .panel h2 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      color: #ccc;
    }

    .log-box {
      background: #000;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      color: #8f8;
      line-height: 1.5;
    }
    .log-box .log-entry {
      border-bottom: 1px solid rgba(255,255,255,0.03);
      padding: 3px 0;
    }
    .log-box .log-time {
      color: #666;
      margin-right: 8px;
    }

    .wallet-box {
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      color: #c9a84c;
      word-break: break-all;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.primary { border-color: rgba(60, 200, 100, 0.4); color: #3fcf6a; }
    .btn.primary:hover { background: rgba(60, 200, 100, 0.1); }
    .btn.danger { border-color: rgba(231, 76, 60, 0.4); color: #e74c3c; }
    .btn.danger:hover { background: rgba(231, 76, 60, 0.1); }

    .power-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    .power-control input[type="range"] {
      flex: 1;
      max-width: 300px;
    }
    .power-value {
      font-variant-numeric: tabular-nums;
      min-width: 40px;
      text-align: right;
      color: #c9a84c;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state h3 { color: #888; margin-bottom: 8px; }

    @media (max-width: 600px) {
      .container { padding: 16px; }
      .header { padding: 16px 20px; flex-direction: column; gap: 10px; align-items: flex-start; }
      .stat-card .value { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⛏ Mining Admin</h1>
    <div class="badge">
      <div class="badge-dot" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
  </div>

  <div class="container">
    <!-- Stats Grid -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="label">Hashrate</div>
        <div class="value hashrate" id="stat-hashrate">—</div>
        <div class="sub">H/s</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Hashes</div>
        <div class="value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Accepted Shares</div>
        <div class="value shares" id="stat-accepted">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Rejected Shares</div>
        <div class="value" id="stat-rejected">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Uptime</div>
        <div class="value" id="stat-uptime">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Status</div>
        <div class="value small" id="stat-status">—</div>
      </div>
    </div>

    <!-- Wallet -->
    <div class="panel">
      <h2>Wallet Address</h2>
      <div class="wallet-box" id="wallet-address">Loading...</div>
    </div>

    <!-- Controls -->
    <div class="panel">
      <h2>Controls</h2>
      <div class="controls">
        <button class="btn primary" id="btn-refresh" onclick="refreshStats()">🔄 Refresh Stats</button>
        <button class="btn" id="btn-clear-log" onclick="clearLog()">Clear Log</button>
      </div>
      <div class="power-control">
        <span>Power:</span>
        <input type="range" id="power-slider" min="5" max="100" step="5" value="50">
        <span class="power-value" id="power-value">50%</span>
      </div>
    </div>

    <!-- Live Log -->
    <div class="panel">
      <h2>Live Log</h2>
      <div class="log-box" id="log-box">
        <div class="empty-state">
          <h3>Waiting for miner...</h3>
          <p>Open the miner page in another tab to see live stats here.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== Stats polling from the miner page =====
    let stats = null;
    let logEntries = [];

    function formatNumber(n) {
      if (n === undefined || n === null) return '—';
      return n.toLocaleString();
    }

    function formatDuration(ms) {
      if (!ms) return '—';
      const seconds = Math.floor(ms / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      if (hours > 0) return `${hours}h ${minutes % 60}m`;
      if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
      return `${seconds}s`;
    }

    function updateUI() {
      if (!stats) return;

      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const statusMap = {
        'idle': { text: 'Idle', class: '' },
        'connected': { text: 'Connected', class: 'active' },
        'mining': { text: 'Mining', class: 'active' },
        'disconnected': { text: 'Disconnected', class: '' },
        'error': { text: 'Error', class: 'error' }
      };
      const s = statusMap[stats.status] || statusMap['idle'];
      dot.className = 'badge-dot ' + s.class;
      statusText.textContent = s.text;

      document.getElementById('stat-hashrate').textContent = formatNumber(stats.hashrate);
      document.getElementById('stat-total').textContent = formatNumber(stats.totalHashes);
      document.getElementById('stat-accepted').textContent = formatNumber(stats.acceptedShares);
      document.getElementById('stat-rejected').textContent = formatNumber(stats.rejectedShares);
      document.getElementById('stat-uptime').textContent = stats.connectedSince 
        ? formatDuration(Date.now() - stats.connectedSince) 
        : '—';
      document.getElementById('stat-status').textContent = stats.status || 'idle';
      document.getElementById('wallet-address').textContent = stats.walletAddress || 'Unknown';
    }

    function addLog(text) {
      const time = new Date().toLocaleTimeString();
      logEntries.push({ time, text });
      if (logEntries.length > 100) logEntries.shift();

      const box = document.getElementById('log-box');
      box.innerHTML = logEntries.map(e => 
        `<div class="log-entry"><span class="log-time">${e.time}</span>${e.text}</div>`
      ).join('');
      box.scrollTop = box.scrollHeight;
    }

    function clearLog() {
      logEntries = [];
      document.getElementById('log-box').innerHTML = '<div class="empty-state"><h3>Log cleared</h3></div>';
    }

    function refreshStats() {
      // Try to get stats from the opener or parent window
      try {
        if (window.opener && window.opener.__minerStats) {
          stats = window.opener.__minerStats;
          updateUI();
        }
      } catch (e) {
        console.log('Cannot access opener stats');
      }
    }

    // Poll for stats every 2 seconds
    setInterval(() => {
      refreshStats();
    }, 2000);

    // Power slider
    const slider = document.getElementById('power-slider');
    const powerValue = document.getElementById('power-value');
    slider.addEventListener('input', () => {
      powerValue.textContent = slider.value + '%';
    });

    // Initial load
    refreshStats();
    addLog('Admin dashboard loaded. Waiting for miner connection...');
  </script>
</body>
</html>
